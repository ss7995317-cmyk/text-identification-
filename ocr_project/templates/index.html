<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OCR Studio — YOLOv11n Text Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #00ff9d;
      --accent2: #7c3aed;
      --text: #e2e8f0;
      --muted: #64748b;
      --danger: #ff4757;
      --warn: #ffa502;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,157,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,157,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

    /* ─── HEADER ─── */
    header {
      padding: 32px 0 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    header h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }

    .badge {
      margin-left: auto;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      background: rgba(0,255,157,0.1);
      border: 1px solid rgba(0,255,157,0.3);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 1px;
    }

    /* ─── MAIN LAYOUT ─── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 32px;
    }

    @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }

    /* ─── CARDS ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }

    .card-title {
      font-size: 0.75rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title::before {
      content: '';
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
    }

    /* ─── DROP ZONE ─── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(0,255,157,0.04);
    }

    .drop-zone input {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }

    .drop-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.6; }
    .drop-text { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
    .drop-sub { font-size: 0.8rem; color: var(--muted); font-family: 'Space Mono', monospace; }

    /* ─── PREVIEW ─── */
    .preview-box {
      border-radius: 10px;
      overflow: hidden;
      background: #0d0d14;
      border: 1px solid var(--border);
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .preview-box img {
      max-width: 100%;
      max-height: 400px;
      object-fit: contain;
      display: block;
    }

    .preview-placeholder {
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      text-align: center;
    }

    /* ─── BUTTON ─── */
    .btn-run {
      margin-top: 16px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), #00d4a8);
      border: none;
      border-radius: 10px;
      color: #0a0a0f;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-run:hover { opacity: 0.9; }
    .btn-run:active { transform: scale(0.98); }
    .btn-run:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ─── LOADER ─── */
    .loader {
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent);
    }

    .loader.active { display: flex; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(0,255,157,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── RESULTS ─── */
    .result-section { grid-column: 1 / -1; }

    .result-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
    }

    .tab-btn {
      padding: 8px 18px;
      border: none;
      background: transparent;
      color: var(--muted);
      border-radius: 7px;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ─── TEXT OUTPUT ─── */
    .text-output {
      background: #0d0d14;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      font-family: 'Space Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 120px;
      color: #a8ff78;
    }

    /* ─── REGION CARDS ─── */
    .regions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }

    .region-card {
      background: #0d0d14;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
    }

    .region-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .region-num {
      width: 22px; height: 22px;
      background: var(--accent2);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      color: #fff;
    }

    .region-conf {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      margin-left: auto;
    }

    .region-text {
      font-size: 0.85rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .region-bbox {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ─── ANNOTATED IMAGE ─── */
    .annotated-wrap {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .annotated-wrap img { width: 100%; display: block; }

    /* ─── STATS BAR ─── */
    .stats-bar {
      display: flex;
      gap: 20px;
      padding: 14px 20px;
      background: rgba(0,255,157,0.04);
      border: 1px solid rgba(0,255,157,0.15);
      border-radius: 10px;
      margin-bottom: 16px;
    }

    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-val { font-size: 1.3rem; font-weight: 800; color: var(--accent); }
    .stat-lbl { font-size: 0.65rem; font-family: 'Space Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

    /* ─── ERROR ─── */
    .error-box {
      background: rgba(255,71,87,0.1);
      border: 1px solid rgba(255,71,87,0.3);
      border-radius: 10px;
      padding: 14px 18px;
      color: var(--danger);
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      display: none;
      margin-top: 12px;
    }

    /* ─── COPY BTN ─── */
    .copy-btn {
      float: right;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-family: 'Space Mono', monospace;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }

    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── STATUS DOT ─── */
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .status-dot.green { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .status-dot.red { background: var(--danger); }
    .status-dot.yellow { background: var(--warn); }

    footer {
      text-align: center;
      padding: 40px 0 24px;
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-icon">🔍</div>
      <div>
        <h1>OCR <span>Studio</span></h1>
        <p style="font-size:0.72rem;color:var(--muted);font-family:'Space Mono',monospace;margin-top:2px" id="health-status">
          <span class="status-dot yellow"></span>checking engine...
        </p>
      </div>
      <span class="badge">YOLOv11n + EasyOCR</span>
    </header>

    <div class="main-grid">
      <!-- Upload Card -->
      <div class="card">
        <div class="card-title">Upload Image</div>
        <div class="drop-zone" id="dropZone">
          <input type="file" id="fileInput" accept="image/*" />
          <div class="drop-icon">📄</div>
          <div class="drop-text">Drop image here</div>
          <div class="drop-sub">PNG · JPG · BMP · TIFF · WEBP</div>
        </div>
        <button class="btn-run" id="runBtn" disabled>⚡ Run OCR</button>
        <div class="loader" id="loader">
          <div class="spinner"></div>
          <span>Detecting text regions...</span>
        </div>
        <div class="error-box" id="errorBox"></div>
      </div>

      <!-- Preview Card -->
      <div class="card">
        <div class="card-title">Image Preview</div>
        <div class="preview-box" id="previewBox">
          <div class="preview-placeholder">
            <div style="font-size:2rem;margin-bottom:8px">🖼️</div>
            <div>No image loaded</div>
          </div>
        </div>
      </div>

      <!-- Results Section -->
      <div class="card result-section" id="resultSection" style="display:none">
        <div class="card-title">Extracted Results</div>

        <div class="stats-bar" id="statsBar"></div>

        <div class="result-tabs">
          <button class="tab-btn active" onclick="switchTab('full')">Full Text</button>
          <button class="tab-btn" onclick="switchTab('regions')">Regions</button>
          <button class="tab-btn" onclick="switchTab('annotated')">Annotated Image</button>
          <button class="tab-btn" onclick="switchTab('json')">JSON</button>
        </div>

        <div class="tab-content active" id="tab-full">
          <button class="copy-btn" onclick="copyText()">Copy</button>
          <div class="text-output" id="fullTextOutput"></div>
        </div>

        <div class="tab-content" id="tab-regions">
          <div class="regions-grid" id="regionsGrid"></div>
        </div>

        <div class="tab-content" id="tab-annotated">
          <div class="annotated-wrap">
            <img id="annotatedImg" src="" alt="Annotated output" />
          </div>
        </div>

        <div class="tab-content" id="tab-json">
          <button class="copy-btn" onclick="copyJSON()">Copy JSON</button>
          <div class="text-output" id="jsonOutput" style="color:#93c5fd"></div>
        </div>
      </div>
    </div>

    <footer>
      OCR Studio · YOLOv11n Text Detection · Powered by EasyOCR &amp; Ultralytics
    </footer>
  </div>

  <script>
    let selectedFile = null;
    let lastResult = null;

    // ─── Health check ───────────────────────────────────────────────────────
    async function checkHealth() {
      try {
        const res = await fetch('/api/health');
        const data = await res.json();
        const el = document.getElementById('health-status');
        const yolo = data.yolo_loaded;
        const backend = data.ocr_backend || 'unknown';
        el.innerHTML = `<span class="status-dot ${yolo ? 'green' : 'yellow'}"></span>
          YOLO: ${yolo ? '✅' : '⚠️ base'} · OCR: ${backend}`;
      } catch(e) {
        document.getElementById('health-status').innerHTML =
          '<span class="status-dot red"></span>server offline';
      }
    }
    checkHealth();

    // ─── File handling ───────────────────────────────────────────────────────
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) setFile(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    function setFile(file) {
      selectedFile = file;
      document.getElementById('runBtn').disabled = false;
      hideError();

      const reader = new FileReader();
      reader.onload = e => {
        const box = document.getElementById('previewBox');
        box.innerHTML = `<img src="${e.target.result}" alt="preview" style="max-width:100%;max-height:400px;object-fit:contain;" />`;
      };
      reader.readAsDataURL(file);
    }

    // ─── OCR ─────────────────────────────────────────────────────────────────
    document.getElementById('runBtn').addEventListener('click', async () => {
      if (!selectedFile) return;
      setLoading(true);
      hideError();
      document.getElementById('resultSection').style.display = 'none';

      const form = new FormData();
      form.append('file', selectedFile);

      try {
        const res = await fetch('/api/ocr', { method: 'POST', body: form });
        const data = await res.json();
        if (data.error) { showError(data.error); return; }
        lastResult = data;
        renderResults(data);
      } catch(e) {
        showError('Connection error. Is the Flask server running on port 5000?');
      } finally {
        setLoading(false);
      }
    });

    function renderResults(data) {
      document.getElementById('resultSection').style.display = 'block';

      // Stats
      document.getElementById('statsBar').innerHTML = `
        <div class="stat"><div class="stat-val">${data.total_regions}</div><div class="stat-lbl">Regions</div></div>
        <div class="stat"><div class="stat-val">${data.full_text.length}</div><div class="stat-lbl">Characters</div></div>
        <div class="stat"><div class="stat-val">${data.full_text.trim().split(/\s+/).filter(w=>w).length}</div><div class="stat-lbl">Words</div></div>
        <div class="stat"><div class="stat-val">${data.image_size.width}×${data.image_size.height}</div><div class="stat-lbl">Image Size</div></div>
      `;

      // Full text
      document.getElementById('fullTextOutput').textContent =
        data.full_text || '(No text detected)';

      // Regions
      const grid = document.getElementById('regionsGrid');
      grid.innerHTML = data.regions.map(r => `
        <div class="region-card">
          <div class="region-header">
            <div class="region-num">${r.id}</div>
            <div style="font-size:0.75rem;color:var(--muted)">Region ${r.id}</div>
            <div class="region-conf">conf: ${(r.confidence * 100).toFixed(0)}%</div>
          </div>
          <div class="region-text">${escHtml(r.text)}</div>
          <div class="region-bbox">bbox: [${r.bbox.join(', ')}]</div>
        </div>
      `).join('') || '<p style="color:var(--muted);font-family:Space Mono,monospace;font-size:0.8rem">No regions detected.</p>';

      // Annotated image
      document.getElementById('annotatedImg').src = data.annotated_image_url + '?t=' + Date.now();

      // JSON
      document.getElementById('jsonOutput').textContent = JSON.stringify(data, null, 2);

      document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
    }

    // ─── Tabs ─────────────────────────────────────────────────────────────────
    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        const names = ['full', 'regions', 'annotated', 'json'];
        b.classList.toggle('active', names[i] === name);
      });
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function setLoading(v) {
      document.getElementById('runBtn').disabled = v;
      document.getElementById('loader').classList.toggle('active', v);
      document.getElementById('loader').querySelector('span').textContent =
        v ? 'Detecting text regions...' : '';
    }

    function showError(msg) {
      const el = document.getElementById('errorBox');
      el.textContent = '❌ ' + msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorBox').style.display = 'none';
    }

    function copyText() {
      navigator.clipboard.writeText(document.getElementById('fullTextOutput').textContent);
    }

    function copyJSON() {
      navigator.clipboard.writeText(document.getElementById('jsonOutput').textContent);
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
